<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./assets/css/style.css" />

        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_forward" />
        <title>Workout - BMI</title>
    </head>
    <body class="bmi-body">
        <header class="bmi-header">
            <a href="index.html" class="header-logo">WORKOUT</a>
            <nav class="menu-desk">
                <a href="index.html">Home</a>
                <a href="bmi.html">BMI</a>
                <a href="error.html">Login</a>
            </nav>

            <nav class="menu-mobile-icon">
                <div class="bar-1"></div>
                <div class="bar-2"></div>
                <div class="bar-3"></div>
            </nav>
            <nav class="menu-mobile">
                <a href="index.html">Home</a>
                <a href="bmi.html">BMI</a>
                <a href="error.html">Login</a>
            </nav>
        </header>

        <main class="bmi-main container hidden">
            <h1 class="hidden">Calculate Your BMI</h1>
            <div class="form-content">
                <form class="bmi-form">
                    <div class="bmi-form-input">
                        <label for="Weight">Weight (Kg):</label>
                        <input type="text" id="weight" name="weight" placeholder="Ex: 72" required />
                    </div>

                    <div class="bmi-form-input">
                        <label class="height" for="Height">Height (M):</label>
                        <input type="text" id="height" name="height" placeholder=" Ex: 1.73" required />
                    </div>

                    <button class="bmi-btn" id="calculate">Calculate</button>
                </form>

                <div class="bmi-result">
                    <h4 id="bmi-title">Result</h4>
                    <span id="bmi-value">0</span>
                    <p id="bmi-text"></p>
                </div>
            </div>

            <section class="bmi-results">
                <div class="bmi underweight">
                    <h5>Underweight</h5>
                    <p>18.5 or less</p>
                </div>
                <div class="bmi normal">
                    <h5>Normal</h5>
                    <p>18.5 until 24.9</p>
                </div>
                <div class="bmi overweight">
                    <h5>Overweight</h5>
                    <p>25 until 29.9</p>
                </div>
                <div class="bmi obese">
                    <h5>Obese</h5>
                    <p>30 or above</p>
                </div>
            </section>
        </main>
        <footer>
            <h2>WORKOUT <span>©</span></h2>

            <div class="contact">
                <div class="media">
                    <div class="media-icon"><img src="assets/img/instagram.svg" alt="" /><span>@workout_gym</span></div>
                    <div class="media-icon"><img src="assets/img/twitter-x.svg" alt="" /><span>@workout</span></div>
                    <div class="media-icon"><img src="assets/img/facebook.svg" alt="" /><span> Workout_gym</span></div>
                </div>
                <div class="media">
                    <div class="media-icon"><img src="assets/img/email.svg" alt="" /> <span>workout@gmail.xyz</span></div>
                    <div class="media-icon"><img src="assets/img/telephone.svg" alt="" /> <span>(1) 2345-6789</span></div>
                </div>
            </div>
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
        <script src="./assets/javaScript/menu.js"></script>
        <script src="assets/javaScript/BMI.js"></script>
    </body>
</html>
